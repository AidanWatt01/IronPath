name: cali_skill_tree
description: "Calisthenics progression tracker with skill tree, mastery tiers, and workout history."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.2

  cupertino_icons: ^1.0.8

  drift: ^2.31.0
  drift_flutter: ^0.2.8
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4

  flutter_riverpod: ^2.5.1
  health: ^13.3.1
  http: ^1.6.0
  app_links: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  drift_dev: ^2.31.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "homeIcon.png"
